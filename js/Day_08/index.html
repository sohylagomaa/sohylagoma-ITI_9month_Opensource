      //2
      let users = [];

      let select = document.getElementById("users");
      let btn = document.getElementById("show");

      async function getUsers() {
        let response = await fetch("https://dummyjson.com/users");
        let data = await response.json();

        users = data.users;

        users.forEach((user) => {
          let option = document.createElement("option");
          option.value = user.id;
          option.textContent = user.firstName;
          select.appendChild(option);
        });

        btn.disabled = false;
      }

      getUsers();

      btn.addEventListener("click", function () {
        let selectedId = select.value;

        if (!selectedId) return;

        let user = users.find((u) => u.id == selectedId);

        document.getElementById(
          "printUser"
        ).innerHTML = `<p>${user.firstName}</p>
        <p>${user.age}</p>
        `;
      });

      //3
      function addPost() {
        fetch("https://jsonplaceholder.typicode.com/posts", {
          method: "post",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            title: "foo",
            body: "bar",
            userId: 1,
          }),
        })
          .then((response) => {
            return response.json();
          })
          .then((data) => {
            console.log("successfull:", data);
          })
          .catch(function (error) {
            console.error(error);
          });
      }
      addPost();

      //4
      function showWelcome() {
        return new Promise((resolve) => {

      function showImage() {
        return new Promise((resolve) => {
          let img = document.getElementById("userImage");
          img.src = "#";
          resolve();
        });
      }

      function showThanks() {
        return new Promise((resolve) => {
          document.getElementById("thanks").textContent =
            "Thanks for visiting!";
          setTimeout(resolve, 3000);
        });
      }

      function redirect() {
        return new Promise((resolve) => {
          window.location.href = "https://www.google.com";
          resolve();
        });
