      //6
      console.log("=================");

      function* tipsGenerator() {
        let tips = [
          "tip_1",
          "tip_2",
          "tip_3",
          "tip_4",
          "tip_5",
          "tip_6",
          "tip_7",
        ];
        for (let tip of tips) {
          yield tip;
        }
      }

      let gen = tipsGenerator();
      console.log(gen.next().value);

      document.getElementById("gen").onclick = function () {
        let gener = tipsGenerator();
        for (let tip of gener) {
          console.log(tip);
        }
      };

      document.getElementById("tip").onclick = function () {
        let gen = tipsGenerator();

        let interval = setInterval(() => {
          let result = gen.next();
          if (result.done) {
            clearInterval(interval);
          } else {
            console.log(result.value);
          }
        }, 3000);
      };
    </script>
