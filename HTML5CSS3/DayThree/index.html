<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Three</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <svg width="300" height="300" viewBox="0 0 300 300">
      <!-- Face -->
      <circle cx="150" cy="150" r="120" class="face" />

      <!-- Eyes -->
      <circle cx="110" cy="130" r="15" class="eye" />
      <circle cx="190" cy="130" r="15" class="eye" />

      <!-- Nose -->
      <ellipse cx="150" cy="165" rx="8" ry="15" class="nose" />

      <!-- Mouth -->
      <ellipse cx="150" cy="200" rx="35" ry="15" class="mouth" />
    </svg>
    <!-- ===== -->
    <canvas id="faceCanvas" width="300" height="300"></canvas>
    <!-- === -->
    <canvas id="myCanvas" width="400" height="400"></canvas>

    <script>
      // =====
      const canvas = document.getElementById("faceCanvas");
      const ctx = canvas.getContext("2d");

      const sadImg = new Image();
      const smileImg = new Image();

      sadImg.src = "sad.png";
      smileImg.src = "smiley.png";

      function drawImage(img, scaleX = 1) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const imgWidth = 200;
        const imgHeight = 200;
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(scaleX, 1);
        ctx.drawImage(img, -imgWidth / 2, -imgHeight / 2, imgWidth, imgHeight);
        ctx.restore();
      }

      sadImg.onload = () => {
        drawImage(sadImg, 1);
      };

      canvas.addEventListener("mousedown", () => {
        drawImage(smileImg, 1.2);
      });

      canvas.addEventListener("mouseup", () => {
        drawImage(sadImg, 1);
      });

      //====
      
    </script>
  </body>
</html>
